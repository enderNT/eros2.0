server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/llm-logs {
    proxy_pass http://app:8000/debug/llm-logs;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/llm-flows {
    proxy_pass http://app:8000/debug/llm-flows;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/llm-flow {
    proxy_pass http://app:8000/debug/llm-flow;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
